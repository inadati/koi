# .claudeディレクトリの管理（スキル）
- name: .claude
  lang: any
  tree:
    - name: skills
      tree:
        - from: https://github.com/itton-claude-skills/moli.git
        - from: https://github.com/itton-claude-skills/expert-skill-make.git
        - from: https://github.com/itton-claude-skills/expert-skill-edit.git
        - from: https://github.com/itton-claude-skills/expert-git-commit.git



- name: _test
  lang: any
  file:
    - name: README.md



# koiプロジェクト本体
- name: .
  lang: rust
  tree:
    - name: src
      file:
        - name: main  # CLIエントリーポイント
      tree:
        # コマンド層（clapによるCLI定義）
        - name: cli
          file:
            - name: args      # コマンドライン引数の定義
            - name: commands  # サブコマンドの列挙と実行

        # コマンド実装層
        - name: commands
          file:
            - name: install   # スキルの取得 / --restore で .koi.skills から一括復元
            - name: update    # リモートからローカルへ同期（pull）
            - name: new       # リモートに新規スキルリポジトリ作成 + SKILL.mdテンプレート配置 + ローカルDL
            - name: remote    # koi remote update / koi remote set-org
            - name: list      # インストール済みスキルの一覧
            - name: uninstall # スキルの削除

        # GitHub API層（gh CLI経由）
        - name: github
          file:
            - name: api       # gh apiコマンドのラッパー
            - name: repo      # リポジトリ一覧取得・作成
            - name: auth      # gh CLI認証チェック・案内

        # Git操作層
        - name: git
          file:
            - name: command   # git -C によるコマンド実行ラッパー
            - name: clone     # git clone
            - name: sync      # git stash / pull / push --no-verify

        # スキル管理層
        - name: skill
          file:
            - name: metadata  # スキルのメタデータ (SKILL.md解析)
            - name: path      # スキルのパス解決
            - name: validator # スキルの妥当性検証
            - name: lockfile  # .koi.skills / ~/.koi/global.skills の読み書き

        # 対話的UI層（dioxus）
        - name: ui
          file:
            - name: fuzzy     # 曖昧検索のインタラクティブUI
            - name: prompt    # 確認プロンプト
            - name: progress  # 進行状況表示

        # ユーティリティ層
        - name: utils
          file:
            - name: fs        # ファイルシステム操作
            - name: error     # エラー型の定義
            - name: config    # 設定ファイルの読み書き

